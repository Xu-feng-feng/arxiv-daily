name: Run Arxiv Papers Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"   # 等价于每天 00:00/12:00 UTC（JST=09:00/21:00）

# 让 token 具备写入内容的权限，便于回推更改
permissions:
  contents: write

jobs:
  build:
    name: update
    runs-on: ubuntu-latest

    # 防并发（同一分支上一次还在跑就取消）
    concurrency:
      group: arxiv-daily-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # 或 @v5（若你已验证）
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'              # 缓存 pip 依赖

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "arxiv==1.4.8" requests pyyaml

      - name: Run daily arxiv
        env:
          # 建议：你的脚本里使用自定义 UA 访问 arXiv
          ARXIV_USER_AGENT: "arxiv-daily (+https://github.com/Xu-feng-feng/arxiv-daily)"
        run: |
          python daily_arxiv.py

      - name: Commit & push updates
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          push-branch: 'main'   # 🔴 关键：指定你的默认分支
          commit-message: "Github Action: Automatic Update Interested Arxiv Papers"
          files: |
            README.md
            docs/arxiv-daily.json
            docs/arxiv-daily-web.json
            docs/index.md
            docs/arxiv-daily-wechat.json
            docs/wechat.md
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
